<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA DTR — Login | Procurement</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --primary-light: #3b82f6;
      --success: #10b981;
      --error: #ef4444;
      --info: #06b6d4;
      --bg-dark: #0f172a;
      --bg-medium: #1e293b;
      --bg-light: #334155;
      --card-bg: rgba(30, 41, 59, 0.95);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-dim: #94a3b8;
      --border: rgba(148, 163, 184, 0.2);
      --shadow-lg: 0 25px 60px rgba(0,0,0,0.5);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-container {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 0; pointer-events: none;
    }
    .bg-gradient {
      position: absolute; width: 100%; height: 100%;
      background: linear-gradient(135deg, #0f172a 0%, #1a2744 50%, #0f172a 100%);
    }
    .grid-overlay {
      position: absolute; width: 100%; height: 100%;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(148,163,184,0.03) 50px, rgba(148,163,184,0.03) 51px),
        repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(148,163,184,0.03) 50px, rgba(148,163,184,0.03) 51px);
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.15;
      animation: float 20s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: var(--primary); top: -200px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: var(--info); bottom: -150px; right: -100px; animation-delay: -10s; }
    .orb3 { width: 300px; height: 300px; background: var(--success); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; opacity: 0.08; }
    @keyframes float {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(30px, 40px); }
    }

    .login-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      padding: 1.5rem;
      animation: fadeUp 0.6s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-wrap {
      width: 72px; height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.25rem;
      box-shadow: 0 8px 24px rgba(37,99,235,0.4);
    }
    .logo-wrap img { width: 50px; height: 50px; object-fit: contain; }

    .login-title {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.375rem;
    }
    .login-subtitle { color: var(--text-dim); font-size: 0.9rem; }

    /* Role Toggle */
    .role-toggle {
      display: flex;
      background: rgba(15,23,42,0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.3rem;
      margin-bottom: 1.75rem;
      gap: 0.25rem;
    }
    .role-btn {
      flex: 1;
      padding: 0.625rem;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text-dim);
      background: transparent;
    }
    .role-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }

    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(15,23,42,0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
      background: rgba(37,99,235,0.05);
    }
    .form-input::placeholder { color: var(--text-dim); }

    .password-wrap { position: relative; }
    .toggle-pass {
      position: absolute; right: 1rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      font-size: 1.1rem; padding: 0.25rem;
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.4); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .alert {
      padding: 0.875rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-info { background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.2); color: #67e8f9; }

    .login-footer {
      text-align: center;
      margin-top: 1.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    .login-footer strong { color: var(--primary-light); }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="bg-container">
  <div class="bg-gradient"></div>
  <div class="grid-overlay"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-wrap">
        <img src="logo.png" alt="UB Procurement Logo">
      </div>
      <h1 class="login-title">DTR SYSTEM</h1>
      <p class="login-subtitle">Procurement Department</p>
    </div>

    <!-- Role Toggle -->
    <div class="role-toggle">
      <button class="role-btn active" id="role-sa" onclick="setRole('sa')">Student Assistant</button>
      <button class="role-btn" id="role-staff" onclick="setRole('staff')">Procurement Staff</button>
    </div>

    <!-- Alert -->
    <div class="alert alert-error" id="error-alert"></div>
    <div class="alert alert-info" id="info-alert"></div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-input" placeholder="your.email@s.ubaguio.edu" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" class="form-input" placeholder="Enter password" autocomplete="current-password">
        <button class="toggle-pass" onclick="togglePassword()" type="button">👁</button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">
      <span class="btn-text">🔐 Sign In</span>
      <div class="spinner"></div>
    </button>

    <div class="login-footer">
      <strong>Procurement Department</strong><br>
      University of Baguio • DTR System<br>
      <small>Contact your admin if you don't have an account</small>
    </div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════
  // 🔥 FIREBASE CONFIGURATION
  // Replace with your own Firebase project config
  // ═══════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "YOUR-API-KEY",
    authDomain: "YOUR-PROJECT.firebaseapp.com",
    projectId: "YOUR-PROJECT-ID",
    storageBucket: "YOUR-PROJECT.appspot.com",
    messagingSenderId: "YOUR-SENDER-ID",
    appId: "YOUR-APP-ID"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  let selectedRole = 'sa';

  // Redirect if already logged in
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      await redirectByRole(user.uid);
    }
  });

  function setRole(role) {
    selectedRole = role;
    document.getElementById('role-sa').classList.toggle('active', role === 'sa');
    document.getElementById('role-staff').classList.toggle('active', role === 'staff');
    document.getElementById('email').placeholder =
      role === 'sa' ? 'your.email@s.ubaguio.edu' : 'staff.email@ubaguio.edu';
    hideAlerts();
  }

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    hideAlerts();

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    setLoading(true);
    try {
      const cred    = await auth.signInWithEmailAndPassword(email, password);
      const uid     = cred.user.uid;
      await redirectByRole(uid);
    } catch (err) {
      let msg = 'Login failed. Please check your credentials.';
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        msg = 'Invalid email or password. Please try again.';
      } else if (err.code === 'auth/too-many-requests') {
        msg = 'Too many failed attempts. Please try again later.';
      } else if (err.code === 'auth/user-disabled') {
        msg = 'Your account has been disabled. Contact admin.';
      }
      showError(msg);
    } finally {
      setLoading(false);
    }
  }

  async function redirectByRole(uid) {
    try {
      showInfo('Verifying account...');
      const userDoc  = await db.collection('users').doc(uid).get();
      if (!userDoc.exists) {
        await auth.signOut();
        showError('Account not set up in the system. Contact your admin.');
        return;
      }
      const role = userDoc.data().role;
      if (role === 'staff' || role === 'admin') {
        showInfo('Welcome! Redirecting to Admin Panel...');
        setTimeout(() => window.location.href = 'sa-dtr-admin.html', 800);
      } else if (role === 'sa') {
        showInfo('Welcome! Redirecting to DTR Check-In...');
        setTimeout(() => window.location.href = 'sa-dtr-checkin.html', 800);
      } else {
        showError('Unrecognized account role. Contact admin.');
        await auth.signOut();
      }
    } catch (err) {
      showError('Error loading account. Please try again.');
      console.error(err);
    }
  }

  function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  document.getElementById('password').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });

  function setLoading(on) {
    const btn = document.getElementById('login-btn');
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  function showError(msg) {
    const el = document.getElementById('error-alert');
    el.textContent = '⚠️ ' + msg;
    el.classList.add('show');
    document.getElementById('info-alert').classList.remove('show');
  }

  function showInfo(msg) {
    const el = document.getElementById('info-alert');
    el.textContent = '⏳ ' + msg;
    el.classList.add('show');
    document.getElementById('error-alert').classList.remove('show');
  }

  function hideAlerts() {
    document.getElementById('error-alert').classList.remove('show');
    document.getElementById('info-alert').classList.remove('show');
  }
</script>
</body>
</html>
